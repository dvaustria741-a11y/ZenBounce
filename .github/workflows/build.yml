name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository and submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Extract JDK version
        id: versions
        run: |
          set -euo pipefail
          JDK_VERSION=$(grep '^jdk[[:space:]]*=' gradle/libs.versions.toml | head -n1 | sed -n 's/^[^=]*=[[:space:]]*"\([^"]*\)".*/\1/p')
          if [ -z "$JDK_VERSION" ]; then
            echo "[ERROR] jdk version not found in gradle/libs.versions.toml" >&2
            exit 1
          fi
          echo "jdk_version=$JDK_VERSION" >> "$GITHUB_OUTPUT"

      - name: Setting up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ steps.versions.outputs.jdk_version }}

      - name: Grant permissions to src-theme
        run: sudo chmod -R 777 src-theme

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build
        env:
          CI: true
        run: ./gradlew build -x test -x detekt

      - name: Find built jar
        id: jar
        run: |
          set -euo pipefail
          JAR=$(find build/libs -maxdepth 1 -regex '.*liquidbounce-[0-9.]*\.jar' | head -n1)
          if [ -z "$JAR" ]; then
            echo "[ERROR] built jar not found in build/libs" >&2
            ls -la build/libs || true
            exit 1
          fi
          echo "jar_path=$JAR" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: liquidbounce-fabric
          path: ${{ steps.jar.outputs.jar_path }}
          if-no-files-found: error
